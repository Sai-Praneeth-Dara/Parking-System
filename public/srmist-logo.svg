<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" width="220" height="60">
  <defs>
    <linearGradient id="srmGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8960c;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5c842;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8960c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="srmBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#003087;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#001a5e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Emblem circle -->
  <circle cx="30" cy="30" r="27" fill="url(#srmBlue)" stroke="url(#srmGold)" stroke-width="2"/>

  <!-- Inner ring -->
  <circle cx="30" cy="30" r="22" fill="none" stroke="url(#srmGold)" stroke-width="0.8" opacity="0.6"/>

  <!-- SRM Letters in emblem -->
  <text x="30" y="25" text-anchor="middle" font-family="Georgia, serif" font-size="9" font-weight="bold" fill="url(#srmGold)" letter-spacing="1">SRM</text>
  <text x="30" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="5.5" fill="#f5c842" letter-spacing="0.5">INSTITUTE OF</text>
  <text x="30" y="42" text-anchor="middle" font-family="Georgia, serif" font-size="5.5" fill="#f5c842" letter-spacing="0.5">SCIENCE &amp; TECH</text>

  <!-- Torch/flame icon at top of emblem -->
  <path d="M30 7 L28 13 L30 11 L32 13 Z" fill="#f5c842"/>
  <rect x="29.2" y="11" width="1.6" height="5" fill="#f5c842" rx="0.5"/>

  <!-- Laurel arcs on sides -->
  <path d="M10 30 Q8 22 14 16" fill="none" stroke="#f5c842" stroke-width="1" opacity="0.7"/>
  <path d="M50 30 Q52 22 46 16" fill="none" stroke="#f5c842" stroke-width="1" opacity="0.7"/>

  <!-- Stars at bottom -->
  <text x="22" y="51" font-size="5" fill="#f5c842">★</text>
  <text x="28" y="52" font-size="5" fill="#f5c842">★</text>
  <text x="34" y="51" font-size="5" fill="#f5c842">★</text>

  <!-- University name text beside emblem -->
  <text x="65" y="20" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#003087" letter-spacing="0.5">SRM Institute of</text>
  <text x="65" y="36" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#003087" letter-spacing="0.5">Science and Technology</text>
  <text x="65" y="50" font-family="Arial, sans-serif" font-size="8.5" fill="#c8960c" letter-spacing="1.5" font-weight="600">DEEMED TO BE UNIVERSITY</text>
</svg>
